
<form (ngSubmit)="onSubmit()">
  <div class="form-group">
    <label for="exampleInputEmail1">Email address</label>
    <input type="email" [(ngModel)]="credentials.email" name="email" required class="form-control">
  </div>
  <div class="form-group">
    <label for="exampleInputPassword1">Password</label>
    <input type="password" [(ngModel)]="credentials.password" name="password" required class="form-control">
  </div>

  <button type="submit" class="btn btn-primary">Bejelntkezés</button>
</form>
