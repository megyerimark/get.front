<form (ngSubmit)="onSubmit()" style="display: flex; flex-direction: column; gap: 15px;">
  <div>
    <label style="display: block; margin-bottom: 5px; font-weight: bold;">Teljes neved</label>
    <input type="text" [(ngModel)]="guest.guest_name" name="guest_name" required
           style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box;">
  </div>
  
  <div>
    <label style="display: block; margin-bottom: 5px; font-weight: bold;">Telefonszámod</label>
    <input type="tel" [(ngModel)]="guest.guest_phone" name="guest_phone" required
           style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box;">
  </div>

  <div>
    <label style="display: block; margin-bottom: 5px; font-weight: bold;">Email címed (ide jön a QR kód)</label>
    <input type="email" [(ngModel)]="guest.guest_email" name="guest_email" required
           style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box;">
  </div>

  <div style="margin-top: 10px; padding: 15px; background-color: #f1f1f1; border-radius: 6px; border: 1px solid #e9ecef;">
    <label style="display: flex; align-items: flex-start; cursor: pointer; color: #333; margin: 0;">
      <input 
        type="checkbox" 
        name="terms" 
        [(ngModel)]="termsAccepted" 
        (change)="onTermsChange($event)"
        style="margin-top: 3px; margin-right: 12px; width: 18px; height: 18px; cursor: pointer;">
      <span style="font-size: 14px; line-height: 1.4;">
        Elfogadom a <a href="/aszf" target="_blank" style="color: #17a2b8; text-decoration: none; font-weight: bold;">Foglalási és fizetési feltételeket</a>, és tudomásul veszem a fizetendő díjakat.
      </span>
    </label>
  </div>

  <button type="submit" 
          [disabled]="!termsAccepted"
          [style.opacity]="!termsAccepted ? '0.5' : '1'"
          [style.cursor]="!termsAccepted ? 'not-allowed' : 'pointer'"
          style="padding: 15px; background: #28a745; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; margin-top: 10px; transition: all 0.2s;">
    Időpont lefoglalása
  </button>
</form>
